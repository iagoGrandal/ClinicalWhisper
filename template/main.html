<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClinicalWhisper</title>
  <style>
    :root {
      --bg: #f5fbff;
      --panel: #ffffff;
      --text: #1b1f24;
      --muted: #667085;
      --line: #d8dde5;
      --accent: #126b5a;
      --accent-dark: #0d5245;
      --danger: #b42318;
      --focus: #7a5cfa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .app {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 20px 0;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 2.35rem;
      letter-spacing: 0;
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: right;
    }

    .status.error {
      color: var(--danger);
    }

    main {
      display: grid;
      grid-template-columns: minmax(360px, 1fr) minmax(280px, 25vw);
      gap: 24px;
      align-items: stretch;
    }

    .patient-form,
    .recording-controls,
    .transcript {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }

    .left-column,
    .patient-form,
    .recording-controls {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .patient-form h2,
    .recording-controls h2 {
      margin: 0;
      color: var(--text);
      font-size: 1.15rem;
      letter-spacing: 0;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field-grid.compact {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
    }

    input,
    select {
      height: 44px;
      padding: 0 12px;
    }

    textarea.small-textarea {
      min-height: 66px;
      height: 66px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus,
    button:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--focus) 24%, transparent);
      border-color: var(--focus);
    }

    .record-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 6px;
      padding: 0 22px;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover {
      background: var(--accent-dark);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.66;
    }

    .stop-button {
      background: #b42318;
    }

    .stop-button:hover {
      background: #8f1b13;
    }

    .timer {
      min-width: 92px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .transcript {
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 16px;
      min-height: calc(100vh - 110px);
    }

    .transcript label {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100%;
    }

    textarea {
      min-height: 360px;
      height: 100%;
      padding: 14px;
      resize: vertical;
      line-height: 1.45;
    }

    .secondary-button {
      width: 100%;
      background: #344054;
    }

    .secondary-button:hover {
      background: #1f2937;
    }

    @media (max-width: 820px) {
      header {
        display: grid;
        align-items: start;
      }

      .status {
        text-align: left;
      }

      main {
        grid-template-columns: 1fr;
      }

      .field-grid,
      .field-grid.compact {
        grid-template-columns: 1fr;
      }

      .transcript {
        min-height: 45vh;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>ClinicalWhisper</h1>
      <div id="status" class="status" aria-live="polite"></div>
    </header>

    <main>
      <div class="left-column">
        <section class="patient-form" aria-label="Datos del paciente">
          <h2>Datos del paciente</h2>

          <div class="field-grid">
            <label>
              Nombre completo
              <input id="patientName" name="patientName" type="text" autocomplete="name">
            </label>

            <label>
              DNI
              <input id="patientDni" name="patientDni" type="text" autocomplete="off">
            </label>
          </div>

          <div class="field-grid compact">
            <label>
              Sexo
              <select id="patientSex" name="patientSex">
                <option value="">Sin especificar</option>
                <option value="mujer">Mujer</option>
                <option value="hombre">Hombre</option>
                <option value="otro">Otro</option>
              </select>
            </label>

            <label>
              Teléfono
              <input id="patientPhone" name="patientPhone" type="tel" autocomplete="tel">
            </label>

            <label>
              Fecha de nacimiento
              <input id="birthDate" name="birthDate" type="date">
            </label>

            <label>
              Fecha
              <input id="visitDate" name="visitDate" type="date">
            </label>
          </div>

          <div class="field-grid">
            <label>
              Antecedentes médicos
              <textarea id="medicalHistory" class="small-textarea" name="medicalHistory"></textarea>
            </label>

            <label>
              Medicación actual
              <textarea id="currentMedication" class="small-textarea" name="currentMedication"></textarea>
            </label>

            <label>
              Alergias
              <textarea id="allergies" class="small-textarea" name="allergies"></textarea>
            </label>

            <label>
              Motivo de consulta
              <textarea id="visitReason" class="small-textarea" name="visitReason"></textarea>
            </label>
          </div>
        </section>

        <section class="recording-controls" aria-label="Controles de grabacion">
          <h2>Grabación de sintomas</h2>

          <div class="field-grid">
            <label>
              Idioma
              <select id="language">
                <option value="es" selected>Español</option>
                <option value="en">Ingles</option>
                <option value="gl">Gallego</option>
                <option value="fr">Frances</option>
                <option value="de">Aleman</option>
                <option value="">Autodetectar</option>
              </select>
            </label>
          </div>

          <div class="record-row">
            <button id="startButton" type="button">Start</button>
            <button id="pauseButton" type="button" disabled>Pausa</button>
            <button id="stopButton" class="stop-button" type="button" disabled>Stop</button>
            <span id="timer" class="timer">00:00</span>
          </div>
        </section>
      </div>

      <section class="transcript" aria-label="Transcripcion corregible">
        <label>
          Texto transcrito
          <textarea id="transcript" placeholder="La transcripción aparecerá aquí y podrás corregirla."></textarea>
        </label>
        <button id="sendModelButton" class="secondary-button" type="button">Enviar al modelo</button>
      </section>
    </main>
  </div>

  <script>
    const startButton = document.getElementById("startButton");
    const pauseButton = document.getElementById("pauseButton");
    const stopButton = document.getElementById("stopButton");
    const sendModelButton = document.getElementById("sendModelButton");
    const languageSelect = document.getElementById("language");
    const transcript = document.getElementById("transcript");
    const statusText = document.getElementById("status");
    const timer = document.getElementById("timer");

    let stream = null;
    let audioContext = null;
    let source = null;
    let processor = null;
    let chunks = [];
    let recording = false;
    let paused = false;
    let startedAt = 0;
    let elapsedBeforePause = 0;
    let timerId = null;

    startButton.addEventListener("click", startRecording);
    pauseButton.addEventListener("click", togglePause);
    stopButton.addEventListener("click", stopAndTranscribe);
    sendModelButton.addEventListener("click", () => {
      setReady("Envío al modelo pendiente de implementar.");
    });
    async function startRecording() {
      setBusy(true, "Solicitando microfono...");

      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("Abre la app desde http://127.0.0.1:5000 en un navegador para usar el microfono.");
        }

        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        source = audioContext.createMediaStreamSource(stream);
        processor = audioContext.createScriptProcessor(4096, 1, 1);
        chunks = [];
        recording = true;
        paused = false;
        elapsedBeforePause = 0;
        startedAt = Date.now();

        processor.onaudioprocess = (event) => {
          if (recording && !paused) {
            chunks.push(new Float32Array(event.inputBuffer.getChannelData(0)));
          }
        };

        source.connect(processor);
        processor.connect(audioContext.destination);

        startButton.disabled = true;
        pauseButton.disabled = false;
        stopButton.disabled = false;
        pauseButton.textContent = "Pausa";
        setBusy(true, "Grabando...");
        startTimer();
      } catch (error) {
        setError(readableError(error));
        await resetRecordingState();
      }
    }

    function togglePause() {
      if (!recording) {
        return;
      }

      if (paused) {
        paused = false;
        startedAt = Date.now();
        pauseButton.textContent = "Pausa";
        setReady("Grabando...");
      } else {
        paused = true;
        elapsedBeforePause += Date.now() - startedAt;
        pauseButton.textContent = "Reanudar";
        setReady("Grabacion en pausa.");
      }
    }

    async function stopAndTranscribe() {
      if (!recording) {
        return;
      }

      if (!paused) {
        elapsedBeforePause += Date.now() - startedAt;
      }

      recording = false;
      startButton.disabled = true;
      pauseButton.disabled = true;
      stopButton.disabled = true;
      clearInterval(timerId);

      try {
        setBusy(true, "Transcribiendo...");
        const samples = mergeChunks(chunks);
        if (samples.length === 0) {
          throw new Error("No se capturo audio. Prueba a grabar de nuevo.");
        }

        const resampled = resample(samples, audioContext.sampleRate, 16000);
        const wavBlob = encodeWav(resampled, 16000);
        await closeAudioInput();

        const formData = new FormData();
        formData.append("audio", wavBlob, "recording.wav");
        formData.append("language", languageSelect.value);
        formData.append("model", "base");

        const response = await fetch("/transcribe", {
          method: "POST",
          body: formData
        });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "No se pudo transcribir el audio.");
        }

        transcript.value = data.text || "";
        setReady("Transcripcion lista.");
      } catch (error) {
        setError(readableError(error));
      } finally {
        await resetRecordingState();
      }
    }

    function readableError(error) {
      if (error.name === "NotAllowedError" || error.name === "PermissionDeniedError") {
        return "El navegador ha bloqueado el microfono. Pulsa el candado junto a la URL, permite Microfono y recarga la pagina.";
      }
      if (error.name === "NotFoundError") {
        return "No se encontro ningun microfono conectado.";
      }
      return error.message || "Error inesperado al grabar.";
    }

    function setBusy(disabled, message) {
      startButton.disabled = disabled;
      statusText.classList.remove("error");
      statusText.textContent = message;
    }

    function setReady(message) {
      statusText.classList.remove("error");
      statusText.textContent = message;
    }

    function setError(message) {
      statusText.classList.add("error");
      statusText.textContent = message;
    }

    function startTimer() {
      updateTimerLabel(0);
      clearInterval(timerId);
      timerId = setInterval(() => {
        const elapsed = elapsedBeforePause + (paused ? 0 : Date.now() - startedAt);
        updateTimerLabel(Math.floor(elapsed / 1000));
      }, 250);
    }

    function updateTimerLabel(seconds) {
      const minutes = Math.floor(seconds / 60).toString().padStart(2, "0");
      const rest = Math.floor(seconds % 60).toString().padStart(2, "0");
      timer.textContent = `${minutes}:${rest}`;
    }

    async function closeAudioInput() {
      if (source) {
        try {
          source.disconnect();
        } catch (error) {
          // Already disconnected.
        }
      }
      if (processor) {
        try {
          processor.disconnect();
        } catch (error) {
          // Already disconnected.
        }
      }
      if (audioContext && audioContext.state !== "closed") {
        await audioContext.close();
      }
      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
      }
    }

    async function resetRecordingState() {
      recording = false;
      paused = false;
      clearInterval(timerId);
      await closeAudioInput();
      stream = null;
      audioContext = null;
      source = null;
      processor = null;
      chunks = [];
      elapsedBeforePause = 0;
      startedAt = 0;
      startButton.disabled = false;
      pauseButton.disabled = true;
      stopButton.disabled = true;
      pauseButton.textContent = "Pausa";
    }

    function mergeChunks(chunks) {
      const totalLength = chunks.reduce((sum, chunk) => sum + chunk.length, 0);
      const merged = new Float32Array(totalLength);
      let offset = 0;

      for (const chunk of chunks) {
        merged.set(chunk, offset);
        offset += chunk.length;
      }

      return merged;
    }

    function resample(samples, fromRate, toRate) {
      if (fromRate === toRate) {
        return samples;
      }

      const ratio = fromRate / toRate;
      const result = new Float32Array(Math.round(samples.length / ratio));

      for (let i = 0; i < result.length; i += 1) {
        const position = i * ratio;
        const index = Math.floor(position);
        const nextIndex = Math.min(index + 1, samples.length - 1);
        const weight = position - index;
        result[i] = samples[index] * (1 - weight) + samples[nextIndex] * weight;
      }

      return result;
    }

    function encodeWav(samples, sampleRate) {
      const buffer = new ArrayBuffer(44 + samples.length * 2);
      const view = new DataView(buffer);

      writeString(view, 0, "RIFF");
      view.setUint32(4, 36 + samples.length * 2, true);
      writeString(view, 8, "WAVE");
      writeString(view, 12, "fmt ");
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(view, 36, "data");
      view.setUint32(40, samples.length * 2, true);

      let offset = 44;
      for (const sample of samples) {
        const clipped = Math.max(-1, Math.min(1, sample));
        view.setInt16(offset, clipped < 0 ? clipped * 0x8000 : clipped * 0x7fff, true);
        offset += 2;
      }

      return new Blob([view], { type: "audio/wav" });
    }

    function writeString(view, offset, value) {
      for (let i = 0; i < value.length; i += 1) {
        view.setUint8(offset + i, value.charCodeAt(i));
      }
    }
  </script>
</body>
</html>
